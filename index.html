<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generator CV PL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Generator CV (PL) — układ jak na podglądzie</h1>
    <button id="printBtn" type="button">Drukuj / PDF</button>
  </header>

  <div class="layout">
    <aside class="editor">
      <h2>Edytor tekstu i stylu</h2>

      <div class="field">
        <label for="photoInput">Zdjęcie</label>
        <input id="photoInput" type="file" accept="image/*" />
      </div>

      <div class="field two">
        <div>
          <label for="firstName">Imię</label>
          <input id="firstName" value="Emilia" />
        </div>
        <div>
          <label for="lastName">Nazwisko</label>
          <input id="lastName" value="Hamilton" />
        </div>
      </div>

      <div class="field">
        <label for="role">Stanowisko</label>
        <input id="role" value="Specjalistka ds. marketingu" />
      </div>

      <div class="field">
        <label for="summary">Podsumowanie zawodowe</label>
        <textarea id="summary">Tworzę skuteczne kampanie marketingowe i wspieram rozwój marki przez analizę danych oraz kreatywną komunikację. Łączę strategię z działaniem, dbając o mierzalne wyniki biznesowe.</textarea>
      </div>

      <div class="field">
        <label for="contact">Kontakt (każda linia osobno)</label>
        <textarea id="contact">Telefon: 123-456-7789
E-mail: hello@email.com
Adres: Kraków, Polska
LinkedIn: linkedin.com/in/emilia-hamilton</textarea>
      </div>

      <div class="field">
        <label for="skills">Umiejętności (każda linia osobno)</label>
        <textarea id="skills">Komunikacja
Adaptacja
Przywództwo
Rozwiązywanie problemów
Kreatywność
Zarządzanie czasem</textarea>
      </div>

      <div class="field">
        <label for="education">Wykształcenie / Certyfikaty (każda linia osobno)</label>
        <textarea id="education">Certyfikat Digital Marketing | Akademia X | 2023
Licencjat, Zarządzanie | Uniwersytet Y | 2021</textarea>
      </div>

      <div class="field">
        <label for="experience">Doświadczenie zawodowe (blokami, oddziel pustą linią)</label>
        <textarea id="experience">Specjalistka ds. marketingu | Firma ABC | 2022 – obecnie
- Prowadzenie kampanii digital i social media.
- Wzrost konwersji o 25% w 12 miesięcy.

Młodsza specjalistka marketingu | Firma DEF | 2020 – 2022
- Wsparcie działań contentowych i mailingowych.
- Analiza wyników kampanii i rekomendacje zmian.</textarea>
      </div>

      <h3>Parametry wyglądu</h3>
      <div class="field two">
        <div>
          <label for="fontSize">Rozmiar czcionki (px)</label>
          <input id="fontSize" type="range" min="13" max="19" value="15" />
        </div>
        <div>
          <label for="nameSize">Rozmiar nagłówka (px)</label>
          <input id="nameSize" type="range" min="30" max="56" value="48" />
        </div>
      </div>

      <div class="field two">
        <div>
          <label for="sidebarColor">Kolor panelu bocznego</label>
          <input id="sidebarColor" type="color" value="#2c2d30" />
        </div>
        <div>
          <label for="accentColor">Kolor akcentu</label>
          <input id="accentColor" type="color" value="#c7c7c7" />
        </div>
      </div>
    </aside>

    <main class="preview">
      <article class="cv" id="cvRoot">
        <section class="cv-sidebar">
          <div class="photo-wrap">
            <img id="cvPhoto" alt="Zdjęcie kandydata" />
          </div>

          <div class="cv-section">
            <h3>Kontakt</h3>
            <div id="vContact"></div>
          </div>

          <div class="cv-section">
            <h3>Umiejętności</h3>
            <ul id="vSkills"></ul>
          </div>

          <div class="cv-section">
            <h3>Edukacja</h3>
            <ul id="vEducation"></ul>
          </div>
        </section>

        <section class="cv-main">
          <header class="cv-head">
            <h2 id="vName">EMILIA HAMILTON</h2>
            <p id="vRole">Specjalistka ds. marketingu</p>
          </header>

          <section class="cv-main-section">
            <h3>Podsumowanie zawodowe</h3>
            <p id="vSummary"></p>
          </section>

          <section class="cv-main-section">
            <h3>Doświadczenie zawodowe</h3>
            <div id="vExperience"></div>
          </section>
        </section>
      </article>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
