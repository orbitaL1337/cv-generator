<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Generator CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Mini Generator CV</h1>
      <p>Edytuj wyłącznie treść + czcionkę i rozmiar. Podgląd aktualizuje się na żywo.</p>
    </div>
  </header>

  <div class="layout">
    <aside class="editor">
      <section class="card">
        <h2>Ustawienia typografii</h2>
        <div class="field">
          <label for="fontFamily">Czcionka</label>
          <select id="fontFamily">
            <option value="Inter">Inter</option>
            <option value="Montserrat">Montserrat</option>
            <option value="Open Sans">Open Sans</option>
          </select>
        </div>
        <div class="field">
          <label for="fontSize">Rozmiar bazowy: <span id="fontSizeValue">12.5px</span></label>
          <input id="fontSize" type="range" min="11" max="15" step="0.1" value="12.5" />
        </div>
      </section>

      <section class="card form-grid">
        <h2>Treść CV</h2>
        <div class="field"><label for="firstName">Imię</label><input id="firstName" value="EMILIA"/></div>
        <div class="field"><label for="lastName">Nazwisko</label><input id="lastName" value="HAMILTON"/></div>
        <div class="field"><label for="role">Stanowisko</label><input id="role" value="Professional Title"/></div>

        <div class="field"><label for="phone">Telefon</label><input id="phone" value="023-456-7789"/></div>
        <div class="field"><label for="email">Email</label><input id="email" value="email@gmail.com"/></div>
        <div class="field"><label for="address">Adres</label><input id="address" value="City, State, Country"/></div>
        <div class="field"><label for="linkedin">LinkedIn</label><input id="linkedin" value="linkedin/in/username"/></div>

        <div class="field span-2"><label for="summary">Podsumowanie zawodowe</label><textarea id="summary">This section is your opportunity to make a strong first impression. Write a concise paragraph highlighting your key skills, experience, and achievements.</textarea></div>

        <div class="field span-2"><label for="skills">Skills (jedna pozycja na linię)</label><textarea id="skills">Communication
Adaptability
Leadership
Problem-solving
Creativity
Time Management
Critical Thinking
Conflict Resolution</textarea></div>

        <div class="field span-2"><label for="education">Education (jeden wpis na linię)</label><textarea id="education">Certification name — Institution name | Location | Date – Date
Certification name — Institution name | Location | Date – Date</textarea></div>

        <div class="field span-2"><label for="jobs">Work Experience (bloki oddziel pustą linią)</label><textarea id="jobs">Job Position — Company Name | Location | Date – Present
In this section, describe your main responsibilities and impact.
Use strong action verbs and industry keywords.
Highlight key achievements and measurable outcomes.

Job Position — Company Name | Location | Date – Date
Explain scope of role and contributions to business operations.
Showcase leadership, problem-solving, and technical skills.
Keep bullet points concise and tailored to the role.</textarea></div>

        <div class="field span-2"><label for="rodo">Klauzula RODO</label><textarea id="rodo">Wyrażam zgodę na przetwarzanie moich danych osobowych zawartych w CV dla potrzeb niezbędnych do realizacji procesu rekrutacji zgodnie z Rozporządzeniem Parlamentu Europejskiego i Rady (UE) 2016/679 z dnia 27 kwietnia 2016 r. (RODO).</textarea></div>
      </section>
    </aside>

    <main class="preview-wrap">
      <div class="page" id="cvPage">
        <div class="cv">
          <aside class="sidebar">
            <div class="photo">Twoje zdjęcie</div>
            <div class="side-pad">
              <section>
                <h3 class="side-section-title">Contact</h3>
                <div class="side-rule"></div>
                <div class="contact">
                  <div><div class="k">Phone number</div><div class="v" id="vPhone"></div></div>
                  <div><div class="k">Email</div><div class="v" id="vEmail"></div></div>
                  <div><div class="k">Address</div><div class="v" id="vAddress"></div></div>
                  <div><div class="k">LinkedIn</div><div class="v" id="vLinkedin"></div></div>
                </div>
              </section>

              <section>
                <h3 class="side-section-title">Skills</h3>
                <div class="side-rule"></div>
                <ul class="skills" id="vSkills"></ul>
              </section>

              <section>
                <h3 class="side-section-title">Education</h3>
                <div class="side-rule"></div>
                <div class="edu" id="vEducation"></div>
              </section>
            </div>
          </aside>

          <section class="main">
            <header class="hero">
              <p class="first" id="vFirstName"></p>
              <p class="last" id="vLastName"></p>
              <div class="role" id="vRole"></div>
            </header>

            <section>
              <div class="sec-head"><h2>Professional Summary</h2><div class="line"></div></div>
              <p class="summary" id="vSummary"></p>
            </section>

            <section class="work">
              <div class="sec-head"><h2>Work Experience</h2><div class="line"></div></div>
              <div class="jobs" id="vJobs"></div>
            </section>
          </section>
        </div>

        <div class="rodo-bar" id="vRodo"></div>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
